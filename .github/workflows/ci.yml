name: MoonShardKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Format, public API, and warning-free gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      # Current MoonBit CLI accepts --deny-warn for check and test. The fmt
      # and info subcommands use these executable equivalent gates instead.
      - name: Format check
        run: moon fmt --check

      - name: Check without warnings
        run: moon check --deny-warn --target all

      - name: Verify generated public API
        run: |
          moon info
          git diff --exit-code -- '*.mbti'

      - name: Test without warnings
        run: moon test --deny-warn --target all

  moonbit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [native, js, wasm, wasm-gc]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Show toolchain
        run: moon version --all

      - name: Format check
        run: moon fmt --check

      - name: Check
        run: moon check --deny-warn --target ${{ matrix.target }}

      - name: Test
        run: moon test --deny-warn --target ${{ matrix.target }}

      - name: Run placement demo
        if: matrix.target == 'native'
        run: moon run cmd/main --target js

      - name: Run deterministic workload
        if: matrix.target == 'native'
        run: moon run bench/main --target js

      - name: Verify generated public API
        if: matrix.target == 'native'
        run: |
          moon info
          git diff --exit-code -- '*.mbti'
